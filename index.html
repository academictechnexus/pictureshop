<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FramedForever – Wedding Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCyWFM2q7xsx9HNXb8jpZ6nkik1JXhmt-8",
  authDomain: "pictureshopversion2.firebaseapp.com",
  projectId: "pictureshopversion2",
  storageBucket: "pictureshopversion2.firebasestorage.app",
  messagingSenderId: "682047762135",
  appId: "1:682047762135:web:d6eec286c86fb5dd80ca92"
};
// ─────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ── STATE ─────────────────────────────────────────────────────
let currentUser = null, studioProfile = null, events = [], leads = [];
let selectedEventId = null, currentView = "dashboard", dark = false;
let unsubEvents = null, unsubLeads = null;

// ── DEFAULT WORKFLOW STAGES ───────────────────────────────────
const DEFAULT_STAGES = [
  { id: 0, name: "Booked",             icon: "📅", sla: null },
  { id: 1, name: "Event Completed",    icon: "🎉", sla: 3 },
  { id: 2, name: "Backup Created",     icon: "💾", sla: 1 },
  { id: 3, name: "Gallery Link Sent",  icon: "🔗", sla: 2 },
  { id: 4, name: "Awaiting Selection", icon: "👀", sla: 7 },
  { id: 5, name: "Editing",            icon: "✏️",  sla: 5 },
  { id: 6, name: "Final Delivered",    icon: "📬", sla: 2 },
  { id: 7, name: "Payment Received",   icon: "💰", sla: null },
];

function getStages() {
  return studioProfile?.customStages || DEFAULT_STAGES;
}

// ── AUTH ──────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    const snap = await getDoc(doc(db, "studios", user.uid));
    if (snap.exists()) studioProfile = snap.data();
    startListeners();
    renderApp();
  } else {
    if (unsubEvents) unsubEvents();
    if (unsubLeads) unsubLeads();
    renderAuth();
  }
});

function startListeners() {
  if (unsubEvents) unsubEvents();
  if (unsubLeads) unsubLeads();
  const uid = currentUser.uid;
  unsubEvents = onSnapshot(query(collection(db, "studios", uid, "events"), orderBy("createdAt","desc")), snap => {
    events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderApp();
  });
  unsubLeads = onSnapshot(query(collection(db, "studios", uid, "leads"), orderBy("createdAt","desc")), snap => {
    leads = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderApp();
  });
}

// ── HELPERS ───────────────────────────────────────────────────
const fmtDate = d => { try { return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}); } catch { return d||"—"; }};
const fmtCur = n => new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n||0);
const firstName = n => (n||"").split(" ")[0].split("&")[0].trim();
const daysIn = ts => { try { return Math.floor((Date.now()-new Date(ts))/86400000); } catch { return 0; }};
const isOverdue = ev => { const s=getStages()[ev.stage]; return s&&s.sla&&ev.stage<getStages().length-1&&daysIn(ev.stageEnteredAt)>s.sla; };
const pct = ev => Math.round((ev.stage/(getStages().length-1))*100);
const toast = msg => { const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); };
const $ = id => document.getElementById(id);
const waLink = (phone,msg) => `https://wa.me/${(phone||"").replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`;

// ── FIRESTORE OPS ─────────────────────────────────────────────
async function addEvent(data) {
  const stages = getStages();
  await addDoc(collection(db,"studios",currentUser.uid,"events"), {
    ...data, stage:0, stageEnteredAt:new Date().toISOString(),
    followupCount:0, amountTotal:Number(data.amountTotal)||0,
    amountPaid:Number(data.amountPaid)||0, staff:[], checklist:{},
    galleryLink:"", finalLink:"", notes:"",
    log:[{ts:new Date().toISOString(),msg:"Booking created"}],
    createdAt:serverTimestamp()
  });
}

async function updateEvent(id, data) {
  await updateDoc(doc(db,"studios",currentUser.uid,"events",id), data);
}

async function deleteEvent(id) {
  await deleteDoc(doc(db,"studios",currentUser.uid,"events",id));
}

async function advanceStage(ev) {
  const stages = getStages();
  if (ev.stage >= stages.length-1) return;
  const newStage = ev.stage+1;
  const log = [...(ev.log||[]), {ts:new Date().toISOString(), msg:`Moved to: ${stages[newStage].name}`}];
  await updateEvent(ev.id, {stage:newStage, stageEnteredAt:new Date().toISOString(), log});
  toast(`✓ Stage → ${stages[newStage].name}`);
}

async function logAction(ev, msg) {
  const log = [...(ev.log||[]), {ts:new Date().toISOString(), msg}];
  await updateEvent(ev.id, {log});
}

async function saveStudioProfile(data) {
  await setDoc(doc(db,"studios",currentUser.uid), data, {merge:true});
  studioProfile = {...studioProfile, ...data};
}

async function addLead(data) {
  await addDoc(collection(db,"studios",currentUser.uid,"leads"), {
    ...data, status:"New", createdAt:serverTimestamp(),
    log:[{ts:new Date().toISOString(),msg:"Lead created"}]
  });
}

async function updateLead(id, data) {
  await updateDoc(doc(db,"studios",currentUser.uid,"leads",id), data);
}

async function deleteLead(id) {
  await deleteDoc(doc(db,"studios",currentUser.uid,"leads",id));
}

// ── MESSAGES ──────────────────────────────────────────────────
const sName = () => studioProfile?.studioName||"FramedForever Studio";
const msgs = {
  bookingConfirm: ev => `Hi ${firstName(ev.client)} 😊\n\nYour booking is confirmed with ${sName()}!\n\n📅 Event: ${ev.type}\n🗓 Date: ${fmtDate(ev.date)}\n📍 Venue: ${ev.venue||"As discussed"}\n\nWe're excited to capture your special day!\n\nWarm regards,\n${sName()}`,
  galleryLink: ev => `Hi ${firstName(ev.client)} 😊\n\nYour photos from your ${ev.type} on ${fmtDate(ev.date)} are ready!\n\n👉 ${ev.galleryLink||"[Insert Gallery Link]"}\n\nKindly browse and let us know your selections within 7 days.\n\nWarm regards,\n${sName()}`,
  followup1: ev => `Hi ${firstName(ev.client)} 🌸\n\nJust a gentle reminder that your photo gallery is ready and waiting for your selections!\n\n👉 ${ev.galleryLink||"[Gallery Link]"}\n\nThank you 🙏\n${sName()}`,
  followup2: ev => `Hi ${firstName(ev.client)},\n\nSecond reminder — we'd love to begin editing your photos soon! Could you please share your selections?\n\n👉 ${ev.galleryLink||"[Gallery Link]"}\n\n${sName()}`,
  followup3: ev => `Hi ${firstName(ev.client)},\n\nFinal reminder! If we don't hear back within 2 days, we'll proceed with our professional selection.\n\n👉 ${ev.galleryLink||"[Gallery Link]"}\n\n${sName()}`,
  finalDelivery: ev => `Hi ${firstName(ev.client)} 🎉\n\nYour edited photos are ready!\n\n👉 ${ev.finalLink||"[Final Gallery Link]"}\n\nWe hope you love every frame! ${(ev.amountTotal||0)>(ev.amountPaid||0)?`\n\nKindly process the pending payment of ${fmtCur((ev.amountTotal||0)-(ev.amountPaid||0))}.`:""}\n\nWith love,\n${sName()}`,
  paymentReminder: ev => `Hi ${firstName(ev.client)},\n\nGentle reminder that the payment of ${fmtCur((ev.amountTotal||0)-(ev.amountPaid||0))} is pending.\n\n💳 [Insert UPI/Payment Link]\n\nThank you!\n${sName()}`,
  reviewRequest: ev => `Hi ${firstName(ev.client)} 🌟\n\nWe hope you're loving your photos from your ${ev.type}!\n\nIf you're happy with our work, we'd be so grateful if you could leave us a Google review 🙏\n\n⭐ ${studioProfile?.googleReviewLink||"[Google Review Link]"}\n\nThank you so much!\n${sName()}`,
};

// ── RENDER AUTH ───────────────────────────────────────────────
function renderAuth() {
  document.body.innerHTML = `
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">📷</div>
      <h1 class="auth-brand">FramedForever</h1>
      <p class="auth-sub">Wedding Studio Management</p>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Sign In</button>
        <button class="auth-tab" onclick="showTab('register')">New Studio</button>
      </div>
      <div id="loginForm">
        <div class="fg"><label>EMAIL</label><input type="email" id="loginEmail" placeholder="you@studio.com"></div>
        <div class="fg"><label>PASSWORD</label><input type="password" id="loginPass" placeholder="••••••••"></div>
        <button class="auth-btn" onclick="doLogin()">Sign In →</button>
      </div>
      <div id="registerForm" style="display:none">
        <div class="fg"><label>STUDIO NAME</label><input type="text" id="regStudio" placeholder="Golden Frame Studio"></div>
        <div class="fg"><label>YOUR NAME</label><input type="text" id="regName" placeholder="Your name"></div>
        <div class="fg"><label>EMAIL</label><input type="email" id="regEmail" placeholder="you@studio.com"></div>
        <div class="fg"><label>PASSWORD</label><input type="password" id="regPass" placeholder="min 6 characters"></div>
        <button class="auth-btn" onclick="doRegister()">Create Studio →</button>
      </div>
      <p id="authError" style="color:#c4715a;font-size:12px;margin-top:10px;text-align:center"></p>
    </div>
  </div>`;
}

window.showTab = t => {
  $("loginForm").style.display = t==="login"?"block":"none";
  $("registerForm").style.display = t==="register"?"block":"none";
  document.querySelectorAll(".auth-tab").forEach((b,i)=>b.classList.toggle("active",(t==="login"&&i===0)||(t==="register"&&i===1)));
};

window.doLogin = async () => {
  try {
    await signInWithEmailAndPassword(auth, $("loginEmail").value, $("loginPass").value);
  } catch(e) { $("authError").textContent = e.message.replace("Firebase: ","").replace(/ \(auth.*\)/,""); }
};

window.doRegister = async () => {
  try {
    const cred = await createUserWithEmailAndPassword(auth, $("regEmail").value, $("regPass").value);
    await updateProfile(cred.user, {displayName: $("regName").value});
    const profile = {studioName:$("regStudio").value, ownerName:$("regName").value, email:$("regEmail").value, staff:[], packages:[], customStages:DEFAULT_STAGES, createdAt:new Date().toISOString()};
    await setDoc(doc(db,"studios",cred.user.uid), profile);
    studioProfile = profile;
  } catch(e) { $("authError").textContent = e.message.replace("Firebase: ","").replace(/ \(auth.*\)/,""); }
};

// ── RENDER MAIN APP ───────────────────────────────────────────
function renderApp() {
  const od = events.filter(isOverdue).length;
  document.body.innerHTML = `
  <div class="app ${dark?"dark":""}">
    <nav class="nav">
      <div class="nav-brand">
        <span style="font-size:18px">📷</span>
        <span class="nav-title">FramedForever</span>
        <span class="nav-studio">${studioProfile?.studioName||""}</span>
      </div>
      <div class="nav-links">
        ${["dashboard","events","calendar","leads","settings"].map(v=>`
          <button class="nav-btn ${currentView===v?"active":""}" onclick="setView('${v}')">
            ${{dashboard:"📊",events:"📋",calendar:"🗓️",leads:"🔍",settings:"⚙️"}[v]} ${v.charAt(0).toUpperCase()+v.slice(1)}
          </button>`).join("")}
      </div>
      <div class="nav-right">
        ${od>0?`<span class="od-badge" onclick="setView('events')">⚠ ${od} Overdue</span>`:""}
        <button class="icon-btn" onclick="exportExcel()" title="Export Excel">📥</button>
        <button class="icon-btn" onclick="toggleDark()">${dark?"☀️":"🌙"}</button>
        <button class="icon-btn" onclick="doLogout()" title="Sign out">🚪</button>
      </div>
    </nav>
    <div class="body" id="mainBody"></div>
  </div>
  <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal"></div>
  </div>
  <div id="toastArea"></div>
  <nav class="bottom-nav" id="bottomNav"><div class="bottom-nav-inner">
    <button class="bnav-btn" id="bn_dashboard" onclick="setView('dashboard')"><span class="bnav-icon">📊</span>Dashboard</button>
    <button class="bnav-btn" id="bn_events" onclick="setView('events')"><span class="bnav-icon">📋</span>Events</button>
    <button class="bnav-btn" id="bn_calendar" onclick="setView('calendar')"><span class="bnav-icon">🗓️</span>Calendar</button>
    <button class="bnav-btn" id="bn_leads" onclick="setView('leads')"><span class="bnav-icon">🔍</span>Leads</button>
    <button class="bnav-btn" id="bn_settings" onclick="setView('settings')"><span class="bnav-icon">⚙️</span>Settings</button>
  </div></nav>`;
  renderView();
}

window.setView = v => { currentView=v; renderApp(); setTimeout(()=>{ document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active')); const ab=document.getElementById('bn_'+v); if(ab) ab.classList.add('active'); },50); };
window.toggleDark = () => { dark=!dark; renderApp(); };
window.doLogout = () => signOut(auth);

function renderView() {
  const body = $("mainBody");
  if (!body) return;
  if (currentView==="dashboard") body.innerHTML = renderDashboard();
  else if (currentView==="events") body.innerHTML = renderEventsLayout();
  else if (currentView==="calendar") body.innerHTML = renderCalendar();
  else if (currentView==="leads") body.innerHTML = renderLeads();
  else if (currentView==="settings") body.innerHTML = renderSettings();
  attachEventListeners();
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard() {
  const total=events.length, active=events.filter(e=>e.stage<getStages().length-1).length;
  const od=events.filter(isOverdue).length, done=events.filter(e=>e.stage===getStages().length-1).length;
  const revenue=events.reduce((s,e)=>s+(e.amountTotal||0),0);
  const collected=events.reduce((s,e)=>s+(e.amountPaid||0),0);
  const pending=revenue-collected;
  const overdueList=events.filter(isOverdue).slice(0,5);
  const pendingList=events.filter(e=>(e.amountTotal||0)>(e.amountPaid||0)).slice(0,5);
  return `<div class="page">
    <h2 class="heading">Good day, ${studioProfile?.ownerName?.split(" ")[0]||"there"} 👋</h2>
    <p class="sub-text">${studioProfile?.studioName} · Overview</p>
    <div class="kpi-grid">
      ${kpi("📋","Total",total,"var(--gold)")}
      ${kpi("⚡","Active",active,"var(--gold)")}
      ${kpi("⚠️","Overdue",od,od?"#e07060":"var(--sage)")}
      ${kpi("✅","Completed",done,"var(--sage)")}
      ${kpi("💰","Revenue",fmtCur(revenue),"var(--sage)")}
      ${kpi("✓","Collected",fmtCur(collected),"var(--sage)")}
      ${kpi("⏳","Pending",fmtCur(pending),pending?"#e07060":"var(--sage)")}
    </div>
    <div class="two-col">
      <div class="card">
        <h3 class="card-title">⚠️ Needs Attention</h3>
        ${overdueList.length===0?'<p style="color:var(--sage);font-size:13px">All on track 🎉</p>':overdueList.map(e=>`
          <div class="list-row" onclick="selectEvent('${e.id}')">
            <div><div style="font-weight:600;font-size:13px">${e.client}</div><div style="font-size:11px;color:var(--muted)">${getStages()[e.stage]?.name}</div></div>
            <span style="color:#e07060;font-size:11px;font-weight:700">OVERDUE</span>
          </div>`).join("")}
      </div>
      <div class="card">
        <h3 class="card-title">💰 Pending Payments</h3>
        ${pendingList.length===0?'<p style="color:var(--sage);font-size:13px">No pending payments 🎉</p>':pendingList.map(e=>`
          <div class="list-row" onclick="selectEvent('${e.id}')">
            <div><div style="font-weight:600;font-size:13px">${e.client}</div><div style="font-size:11px;color:var(--muted)">${e.type} · ${fmtDate(e.date)}</div></div>
            <span style="color:#e07060;font-size:13px;font-weight:700">${fmtCur((e.amountTotal||0)-(e.amountPaid||0))}</span>
          </div>`).join("")}
      </div>
    </div>
    <div class="two-col">
      <div class="card">
        <h3 class="card-title">📊 Events by Stage</h3>
        ${getStages().map(s=>{const c=events.filter(e=>e.stage===s.id).length;return c>0?`<div class="list-row"><span style="font-size:13px">${s.icon} ${s.name}</span><span class="badge" style="background:var(--rose-light);color:var(--rose)">${c}</span></div>`:""}).join("")}
      </div>
      <div class="card">
        <h3 class="card-title">🔍 Recent Leads</h3>
        ${leads.slice(0,5).length===0?'<p style="color:var(--muted);font-size:13px">No leads yet</p>':leads.slice(0,5).map(l=>`
          <div class="list-row">
            <div><div style="font-weight:600;font-size:13px">${l.name}</div><div style="font-size:11px;color:var(--muted)">${l.eventType} · ${l.source}</div></div>
            <span class="badge" style="background:var(--sage-light);color:var(--sage)">${l.status}</span>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}
const kpi=(icon,label,val,color)=>`<div class="kpi-card"><div style="font-size:22px">${icon}</div><div style="font-size:18px;font-weight:700;color:${color}">${val}</div><div style="font-size:11px;color:var(--muted)">${label}</div></div>`;

// ── EVENTS LAYOUT ─────────────────────────────────────────────
function renderEventsLayout() {
  const ev = events.find(e=>e.id===selectedEventId);
  return `<div class="events-layout">
    <aside class="sidebar">
      <div style="padding:14px">
        <button class="btn-primary w100" onclick="toggleBookingForm()">＋ New Booking</button>
      </div>
      <div id="bookingForm" style="display:none;padding:0 14px 14px;background:var(--bg);border-bottom:1px solid var(--border)">
        ${bookingFormHTML()}
        <button class="btn-primary w100" style="margin-top:8px" onclick="submitBooking()">Book Event</button>
      </div>
      <div style="padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap">
        ${["all","active","overdue","done"].map(f=>`<button class="filter-btn ${(window._filter||'all')===f?'active':''}" onclick="setFilter('${f}')">${f==="overdue"?"⚠ Overdue":f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join("")}
      </div>
      <div class="event-list">
        ${filteredEvents().map(e=>`
          <div class="event-item ${selectedEventId===e.id?"active":""}" onclick="selectEvent('${e.id}')">
            ${isOverdue(e)?'<div class="od-dot"></div>':""}
            <div style="font-weight:600;font-size:13px">${e.client}</div>
            <div style="font-size:11px;color:var(--muted)">${fmtDate(e.date)} · ${e.type}</div>
            <div class="stage-badge stage-${e.stage}">${getStages()[e.stage]?.icon} ${getStages()[e.stage]?.name}</div>
          </div>`).join("")||'<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted)">No events found</div>'}
      </div>
    </aside>
    <div class="detail-panel">
      ${ev ? renderEventDetail(ev) : '<div class="empty-state"><div style="font-size:52px;opacity:0.3">💍</div><p>Select an event to view workflow</p></div>'}
    </div>
  </div>`;
}

function bookingFormHTML(prefill={}) {
  const pkgs = studioProfile?.packages||[];
  return `
    <div class="fg"><label>CLIENT NAME *</label><input type="text" id="bf_client" value="${prefill.client||""}" placeholder="Priya & Arjun"></div>
    <div class="fg"><label>EVENT DATE *</label><input type="date" id="bf_date" value="${prefill.date||""}"></div>
    <div class="fg"><label>EVENT TYPE</label><select id="bf_type">
      ${["Wedding","Engagement","Reception","Pre-Wedding Shoot","Birthday","Baby Shower","Corporate","Other"].map(t=>`<option ${prefill.type===t?"selected":""}>${t}</option>`).join("")}
    </select></div>
    <div class="fg"><label>PHONE / WHATSAPP</label><input type="text" id="bf_phone" value="${prefill.phone||""}" placeholder="+91 98765 43210"></div>
    <div class="fg"><label>EMAIL</label><input type="email" id="bf_email" value="${prefill.email||""}" placeholder="client@email.com"></div>
    <div class="fg"><label>VENUE</label><input type="text" id="bf_venue" value="${prefill.venue||""}" placeholder="Venue name"></div>
    ${pkgs.length>0?`<div class="fg"><label>PACKAGE</label><select id="bf_pkg" onchange="applyPackage(this.value)"><option value="">-- Select Package --</option>${pkgs.map(p=>`<option value="${p.id}">${p.name} – ${fmtCur(p.price)}</option>`).join("")}</select></div>`:""}
    <div class="fg"><label>TOTAL AMOUNT (₹)</label><input type="number" id="bf_total" value="${prefill.amountTotal||""}" placeholder="50000"></div>
    <div class="fg"><label>ADVANCE PAID (₹)</label><input type="number" id="bf_paid" value="${prefill.amountPaid||""}" placeholder="10000"></div>
    <div class="fg"><label>NOTES</label><textarea id="bf_notes" placeholder="Package details...">${prefill.notes||""}</textarea></div>`;
}

window.applyPackage = id => {
  const pkg = (studioProfile?.packages||[]).find(p=>p.id==id);
  if (pkg) { $("bf_total").value=pkg.price; $("bf_notes").value=pkg.includes||pkg.description||""; }
};

window.toggleBookingForm = () => {
  const f=$("bookingForm");
  f.style.display=f.style.display==="none"?"block":"none";
};

window.submitBooking = async () => {
  const client=$("bf_client").value.trim();
  const date=$("bf_date").value;
  if (!client||!date){toast("Name and date required");return;}
  await addEvent({client,date,type:$("bf_type").value,phone:$("bf_phone").value,email:$("bf_email").value,venue:$("bf_venue").value,amountTotal:$("bf_total").value,amountPaid:$("bf_paid").value,notes:$("bf_notes").value});
  toast(`✓ Booked: ${client}`);
  $("bookingForm").style.display="none";
};

window.setFilter = f => { window._filter=f; renderView(); };
window.selectEvent = id => { selectedEventId=id; currentView="events"; renderView(); };

function filteredEvents() {
  const f=window._filter||"all";
  return events.filter(e=>{
    if(f==="active") return e.stage<getStages().length-1;
    if(f==="overdue") return isOverdue(e);
    if(f==="done") return e.stage===getStages().length-1;
    return true;
  });
}

// ── CALENDAR ──────────────────────────────────────────────────
function renderCalendar() {
  if(!window._calMonth) window._calMonth=new Date();
  const m=window._calMonth;
  const y=m.getFullYear(), mo=m.getMonth();
  const first=new Date(y,mo,1), last=new Date(y,mo+1,0);
  const days=[]; for(let d=1;d<=last.getDate();d++) days.push(new Date(y,mo,d));
  const startDow=first.getDay();
  const eventMap={};
  events.forEach(ev=>{if(!ev.date)return; const k=ev.date; if(!eventMap[k])eventMap[k]=[]; eventMap[k].push(ev);});
  const stageCols=["#8b7db5","#c9a84c","#5a9ec4","#c4715a","#e07060","#c4715a","#7a9e87","#1a1410"];
  const monthName=m.toLocaleDateString("en-IN",{month:"long",year:"numeric"});
  return `<div class="page">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <button class="btn-outline" onclick="calNav(-1)">‹</button>
      <h2 style="font-family:'Playfair Display',serif;font-size:22px;flex:1;text-align:center;margin:0">${monthName}</h2>
      <button class="btn-outline" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="cal-dow">${d}</div>`).join("")}
      ${Array(startDow).fill('<div></div>').join("")}
      ${days.map(day=>{
        const k=`${y}-${String(mo+1).padStart(2,"0")}-${String(day.getDate()).padStart(2,"0")}`;
        const dayEvs=eventMap[k]||[];
        const isToday=k===new Date().toISOString().slice(0,10);
        return `<div class="cal-day ${isToday?"today":""}">
          <div class="cal-num ${isToday?"today-num":""}">${day.getDate()}</div>
          ${dayEvs.slice(0,3).map(ev=>`<div class="cal-chip" style="background:${stageCols[ev.stage]}" onclick="selectEvent('${ev.id}')" title="${ev.client}">${ev.client.split(" ")[0]}</div>`).join("")}
          ${dayEvs.length>3?`<div style="font-size:9px;color:var(--muted)">+${dayEvs.length-3}</div>`:""}
        </div>`;
      }).join("")}
    </div>
  </div>`;
}
window.calNav = dir => { const m=window._calMonth||new Date(); window._calMonth=new Date(m.getFullYear(),m.getMonth()+dir,1); renderView(); };

window.toggleLeadForm = () => { const f=$("leadFormWrap"); if(f) f.style.display=f.style.display==="none"?"block":"none"; };
window.submitLead = async () => {
  const name=$("lf_name")?.value.trim(); if(!name){toast("Name required");return;}

window.openLeadDetail = id => {
  const l=leads.find(x=>x.id===id); if(!l) return;
  $("modal").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-family:'Playfair Display',serif;font-size:18px">${l.name}</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:18px;cursor:pointer">✕</button>
    </div>
    ${[["Event",`${l.eventType||""} ${l.eventDate?`· ${fmtDate(l.eventDate)}`:""}`],["Phone",l.phone],["Email",l.email],["Budget",l.budget?`₹${Number(l.budget).toLocaleString("en-IN")}`:null],["Source",l.source],["Venue",l.venue],["Notes",l.notes]].filter(r=>r[1]).map(r=>`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase">${r[0]}</div><div style="font-size:13px">${r[1]}</div></div>`).join("")}
    <div class="fg" style="margin-top:12px"><label>STATUS</label>

      </select>

    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px">
      ${l.phone?`<a href="${waLink(l.phone,`Hi ${firstName(l.name)}! This is regarding your ${l.eventType||"photography"} enquiry with ${sName()}.`)}" target="_blank" class="btn-wa" style="text-align:center;text-decoration:none">💬 WhatsApp</a>`:""}
      <button class="btn-next" onclick="convertLeadToBooking('${id}')">🎉 Convert to Booking</button>
      <button class="btn-outline" style="color:var(--rose)" onclick="confirmDeleteLead('${id}')">🗑 Delete Lead</button>
    </div>`;
  $("modalOverlay").style.display="flex";
};
window.updateLeadStatus = async (id,status) => { await updateLead(id,{status}); toast(`Status → ${status}`); };
window.confirmDeleteLead = async id => { if(confirm("Delete lead?")){ await deleteLead(id); closeModal(); toast("Deleted"); }};
window.convertLeadToBooking = id => {
  const l=leads.find(x=>x.id===id); if(!l) return;
  window._prefillBooking={client:l.name,phone:l.phone,email:l.email,type:l.eventType,date:l.eventDate,venue:l.venue,notes:l.notes};
  closeModal(); currentView="events"; selectedEventId=null; renderView();
  setTimeout(()=>{ $("bookingForm").style.display="block"; $("bf_client").value=l.name||""; $("bf_phone").value=l.phone||""; $("bf_email").value=l.email||""; $("bf_date").value=l.eventDate||""; $("bf_venue").value=l.venue||""; $("bf_notes").value=l.notes||""; },100);
  toast("Fill in the booking form!");
};

  const stages=getStages();
  const staff=studioProfile?.staff||[];
  const pkgs=studioProfile?.packages||[];
  return `<div class="page" style="max-width:720px">
    <h2 class="heading">Settings</h2>

    <div class="card" style="margin-bottom:16px">
      <h3 class="card-title">Studio Profile</h3>

        <div class="fg"><label>STUDIO NAME</label><input id="s_studio" value="${studioProfile?.studioName||""}"></div>
        <div class="fg"><label>OWNER NAME</label><input id="s_owner" value="${studioProfile?.ownerName||""}"></div>
        <div class="fg"><label>PHONE</label><input id="s_phone" value="${studioProfile?.phone||""}"></div>
        <div class="fg"><label>UPI ID</label><input id="s_upi" value="${studioProfile?.upiId||""}"></div>

          <input type="number" value="${s.sla||""}" id="ss_${i}" placeholder="SLA days" style="width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--ink)">

        </div>`).join("")}
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-outline" onclick="addCustomStage()">＋ Add Stage</button>
        <button class="btn-primary" onclick="saveStages()">Save Stages</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <h3 class="card-title">Packages</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:14px">
        ${pkgs.map(p=>`<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">

window.saveProfile = async () => {
  await saveStudioProfile({studioName:$("s_studio").value,ownerName:$("s_owner").value,phone:$("s_phone").value,upiId:$("s_upi").value,googleReviewLink:$("s_review").value,instagramHandle:$("s_insta").value});
  toast("Profile saved!");
};

window.addCustomStage = () => {
  const stages=getStages();
  const newStage={id:stages.length,name:"New Stage",icon:"📌",sla:null};
  const updated=[...stages.slice(0,-1),newStage,stages[stages.length-1]];
  studioProfile={...studioProfile,customStages:updated};
  renderView();
};

window.removeStage = async i => {
  const stages=getStages().filter((_,idx)=>idx!==i).map((s,idx)=>({...s,id:idx}));
  await saveStudioProfile({customStages:stages});
  renderView(); toast("Stage removed");
};

window.saveStages = async () => {
  const stages=getStages().map((s,i)=>({...s,name:$(`sn_${i}`)?.value||s.name,sla:Number($(`ss_${i}`)?.value)||null}));
  await saveStudioProfile({customStages:stages});
  toast("Stages saved!");
};

window.addPkg = async () => {
  const name=$("pk_name").value.trim(); if(!name){toast("Name required");return;}
  const pkg={id:Date.now(),name,price:Number($("pk_price").value)||0,includes:$("pk_includes").value};
  await saveStudioProfile({packages:[...(studioProfile?.packages||[]),pkg]});
  toast("Package added!"); renderView();
};
window.removePkg = async id => {
  await saveStudioProfile({packages:(studioProfile?.packages||[]).filter(p=>p.id!=id)});
  toast("Removed"); renderView();
};
window.addStaff = async () => {
  const name=$("s_staffName").value.trim(); if(!name) return;
  const entry=`${name} (${$("s_staffRole").value})`;
  await saveStudioProfile({staff:[...(studioProfile?.staff||[]),entry]});
  toast("Staff added"); renderView();
};
window.removeStaff = async name => {
  await saveStudioProfile({staff:(studioProfile?.staff||[]).filter(s=>s!==name)});
  renderView();
};

// ── EXCEL EXPORT ──────────────────────────────────────────────
window.exportExcel = () => {
  const rows=events.map((ev,i)=>({
    "#":i+1,"Client":ev.client,"Type":ev.type,"Date":fmtDate(ev.date),"Venue":ev.venue||"","Phone":ev.phone||"","Email":ev.email||"",
    "Stage":getStages()[ev.stage]?.name||"","Total":ev.amountTotal||0,"Paid":ev.amountPaid||0,"Due":(ev.amountTotal||0)-(ev.amountPaid||0),
    "Staff":(ev.staff||[]).join(", "),"Follow-ups":ev.followupCount||0,"Gallery":ev.galleryLink||"","Final":ev.finalLink||""
  }));
  const headers=Object.keys(rows[0]||{});
  const csv=[headers.join(","),...rows.map(r=>headers.map(h=>`"${String(r[h]||"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=`FramedForever_Events_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  toast("Exported!");
};

.check-item{display:flex;align-items:center;gap:6px;padding:5px;cursor:pointer;font-size:12px;border-radius:5px}
.check-item:hover{background:var(--bg)}
.notes-area{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;background:var(--surface);color:var(--ink);resize:vertical;height:70px;outline:none}
.log-wrap{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 14px}
.log-row{display:flex;gap:8px;font-size:11px;padding-bottom:5px;margin-bottom:5px;border-bottom:1px solid var(--border)}

/* Buttons */
.btn-primary{padding:9px 18px;background:var(--rose);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-outline{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;color:var(--ink)}
.btn-wa{padding:8px 14px;background:#25D366;color:#fff;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block}
.w100{width:100%}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border-radius:10px;overflow:hidden}
.cal-dow{background:var(--ink);color:var(--gold);text-align:center;padding:7px 0;font-size:10px;font-weight:700}
.cal-day{background:var(--bg);min-height:80px;padding:5px 6px}
.cal-day.today{background:var(--rose-light);outline:2px solid var(--rose)}
.cal-num{font-size:11px;color:var(--muted);margin-bottom:3px}
.cal-num.today-num{color:var(--rose);font-weight:700}
.cal-chip{font-size:9px;color:#fff;padding:2px 4px;border-radius:3px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Leads */
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px}
.kanban-col{min-width:185px;flex:0 0 185px}
.kanban-header{padding:6px 10px;border-radius:7px 7px 0 0;font-size:11px;font-weight:700;display:flex;justify-content:space-between}
.lead-card{background:var(--surface);border:1px solid var(--border);border-radius:0 0 7px 7px;padding:9px 10px;margin-bottom:5px;cursor:pointer}
.source-pill{display:inline-block;background:var(--bg);color:var(--muted);border-radius:20px;padding:1px 7px;font-size:9px;margin-top:3px}

/* Settings */
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.stage-edit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;color:var(--ink)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#1a1410;color:#faf7f2;padding:11px 18px;border-radius:8px;font-size:13px;z-index:300;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Inter',sans-serif;color:#8a7e75">Loading...</div>
</body>
</html>
